name: Build Android Debug APK

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build Angular & Compile Android APK
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout Codebase
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js Environment
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # Step 3: Install Package Dependencies
      - name: Install NPM Dependencies
        run: npm ci

      # Step 4: Build Angular Production Web Assets
      - name: Build Angular Web Assets
        run: npm run build -- --configuration=production

      # Step 5: Synchronize Capacitor Native Configuration
      - name: Capacitor Android Sync
        run: npx cap sync android

      # Step 6: Setup Java 21 for Android Gradle compilation
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      # Step 7: Grant Execute Permission to Gradle Wrapper
      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x android/gradlew

      # Step 8: Build Signed Release APK via Gradle
      - name: Compile Android Release APK
        run: ./gradlew assembleRelease
        working-directory: android

      # Step 9: Upload Compiled Artifact
      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
