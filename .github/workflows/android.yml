name: Build Android Debug APK

on:
  push:
    branches:
      - master

jobs:
  build:
    name: Build Angular & Compile Android APK
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout Codebase
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Step 2: Set up Node.js Environment
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      # Step 3: Install Package Dependencies
      - name: Install NPM Dependencies
        run: npm ci --legacy-peer-deps

      # Step 4: Build Angular Production Web Assets
      - name: Build Angular Web Assets
        run: npm run build -- --configuration=production

      # Step 5: Synchronize Capacitor Native Configuration
      - name: Capacitor Android Sync
        run: npx cap sync android

      # Step 6: Setup Java 21 for Android Gradle compilation
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: 'gradle'

      # Step 7: Grant Execute Permission to Gradle Wrapper
      - name: Grant Execute Permission to Gradle Wrapper
        run: chmod +x android/gradlew

      # Step 8: Verify Kotlin files are present
      - name: List Kotlin Source Files
        run: find android/app/src/main/java -name "*.kt" -o -name "*.java" | head -20

      # Step 9: Show app build.gradle contents
      - name: Show app build.gradle
        run: cat android/app/build.gradle

      # Step 10: Build Release APK via Gradle with full stacktrace
      - name: Compile Android Release APK
        run: ./gradlew assembleRelease --stacktrace --info 2>&1 | tail -100
        working-directory: android

      # Step 11: Upload Compiled Artifact
      - name: Upload Release APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7
